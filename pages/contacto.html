<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Contactá a Vera Pet Shop. Envianos tu consulta y te respondemos a la brevedad."
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cause:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/styles.css" />
    <title>Contacto | Vera Pet Shop</title>
  </head>

  <body>
    <header>
      <div class="div-logo">
        <a class="logo" href="../index.html"
          ><img src="../img/Logo.png" alt="Logo - Ir al inicio"
        /></a>
      </div>
      <nav class="header-nav">
        <ul>
          <li><a href="../index.html">Inicio</a></li>
          <li><a href="./contacto.html">Contacto</a></li>
          <li>
            <a href=".//carrito.html" class="carrito-icono"
              >🛒 <span id="contador-carrito">0</span></a
            >
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <h1 class="titulo-contacto text-secondary">Contactanos</h1>
      <form
        class="form-contacto text-dark"
        action="https://formspree.io/f/xgopdbeb"
        method="POST"
      >
        <div class="grupo-input">
          <label for="email">Tu mejor mail:</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="ejemplo@correo.com"
          />
        </div>
        <div class="grupo-input">
          <label for="mensaje">Tu mensaje:</label>
          <textarea
            id="mensaje"
            name="message"
            placeholder="Escribí tu consulta acá..."
          ></textarea>
        </div>
        <div class="contenedor-btn">
          <button class="btn bg-secondary text-dark" type="submit">
            Enviar
          </button>
        </div>
      </form>
    </main>

    <footer>
      <p>Sitio realizado por Lara para Talento Tech</p>
      <nav>
        <ul class="footer-list">
          <li><img src="../img/whatsapp.png" alt="logo de whatsapp" /></li>
          <li><img src="../img/instagram.png" alt="logo de instagram" /></li>
        </ul>
      </nav>
    </footer>

    <script src="../js/index.js" type="module"></script>
  </body>
</html>
